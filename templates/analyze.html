<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze Sentiment</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <script>
    if (!localStorage.getItem("token")) {
        window.location.href = "/login";
    }
</script>

</head>
<body>

<header class="topbar">
    <h2>Sentiment Analyzer</h2>

    <nav>
        <a href="{{ url_for('analyze_page') }}">Analyze</a>
        <a href="{{ url_for('history_page') }}">History</a>
        <a href="{{ url_for('profile_page') }}">Profile</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
</header>

<main class="app-container">

    <!-- INPUT CARD -->
    <section class="card">
        <h1>Analyze Text</h1>

        <div class="input-group">
            <label for="text">Enter text</label>
            <textarea id="text" rows="6" placeholder="Type or paste text here..."></textarea>
        </div>

        <button onclick="analyzeText()">ANALYZE</button>
    </section>

    <!-- RESULT CARD -->
    <section class="card">
        <h1>Result</h1>

        <div class="result-box" id="resultBox">
            <p>No analysis yet. Submit text above.</p>
        </div>
    </section>

</main>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/analyze.js') }}"></script>

</body>
</html>
