<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="topbar">
    <h2>Sentiment Analyzer</h2>
    <nav>
        <a href="{{ url_for('analyze_page') }}">Analyze</a>
        <a href="{{ url_for('history_page') }}">History</a>
        <a href="{{ url_for('profile_page') }}" class="active">Profile</a>
        <a href="#" onclick="logout()">Logout</a>
    </nav>
</header>

<main class="app-container">
    <div class="profile-grid">
        
        <aside class="card user-info-card">
            <div id="avatar" class="avatar-placeholder">
                
            </div>
            <h1 id="username"></h1>
            <p id="email" style="color: var(--text-muted); margin-bottom: 20px;"></p>
            <div style="border-top: 1px solid var(--border); padding-top: 20px;">
                <p style="font-size: 13px;">
                    Member Since:<br>
                    <strong id="joined"></strong>
                </p>
            </div>
        </aside>

        <section>
            <div class="stat-group">
                <div class="stat-card">
                    <h3>Total Scans</h3>
                    <div id="total" class="value"></div>
                </div>
                <div class="stat-card">
                    <h3>Avg. Confidence</h3>
                    <div id="avg_conf" class="value"></div>
                </div>
                <div class="stat-card">
                    <h3>Most Frequent</h3>
                    <div id="top_sentiment" class="value" style="font-size: 18px;"></div>
                </div>
            </div>

            <div class="card">
                <h2 style="font-size: 18px; margin-bottom: 20px;">Recent Activity</h2>
            
                <div id="recentActivity" class="result-box" style="border-style: solid; background: white;">
                    <p>Loading...</p>
                </div>
            </div>
        </section>

    </div>
</main>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
<script src="{{ url_for('static', filename='js/profile.js') }}"></script>

</body>
</html>
